<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Evasion</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;font-family:'Inter',sans-serif;height:100vh;height:100dvh;overflow:hidden;color:#e0e0e0}

#intro{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:#0a0a0f;transition:opacity .6s ease,visibility .6s}
#intro.gone{opacity:0;visibility:hidden;pointer-events:none}
#intro h1{font-size:2.2rem;font-weight:700;letter-spacing:-.02em;background:linear-gradient(135deg,#ff6b6b,#ffa36b,#ffe06b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
#intro p{font-size:.9rem;color:#555;margin-bottom:28px;font-weight:300;max-width:320px;text-align:center;line-height:1.6}
.btn{font-family:'Inter',sans-serif;font-size:.85rem;font-weight:600;padding:14px 40px;border:none;border-radius:8px;cursor:pointer;transition:transform .15s ease,box-shadow .3s ease;letter-spacing:.02em}
.btn:active{transform:scale(.95)}
#start-btn{background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;box-shadow:0 4px 24px rgba(238,90,36,.25)}
#start-btn:hover{box-shadow:0 6px 32px rgba(238,90,36,.4)}

#arena{position:fixed;inset:0;display:none}
#arena.active{display:block}
#hud{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:5;font-size:.8rem;color:#444;font-weight:400;letter-spacing:.05em}
#hud span{color:#ff6b6b;font-weight:600;font-variant-numeric:tabular-nums}

#target{position:fixed;z-index:4;padding:14px 32px;background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:transform .08s ease,box-shadow .2s ease;box-shadow:0 4px 20px rgba(238,90,36,.3);white-space:nowrap;user-select:none;-webkit-user-select:none;touch-action:none}
#target:hover{box-shadow:0 6px 28px rgba(238,90,36,.45)}
#target.caught{transform:scale(1.3)!important;transition:transform .1s ease}

#trail{position:fixed;inset:0;z-index:1;pointer-events:none}

#result{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:#0a0a0f;padding:24px}
#result.show{display:flex}
#result h2{font-size:1.8rem;font-weight:700;margin-bottom:6px;background:linear-gradient(135deg,#ff6b6b,#ffa36b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#result .subtitle{font-size:.8rem;color:#555;margin-bottom:32px;font-weight:300;letter-spacing:.04em}
#result .stats{width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px;margin-bottom:32px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:8px}
.stat-label{font-size:.75rem;color:#666;font-weight:400}
.stat-value{font-size:.85rem;color:#ff6b6b;font-weight:600}
#result .verdict{font-size:.75rem;color:#444;text-align:center;max-width:300px;line-height:1.6;margin-bottom:24px;font-weight:300}
#retry-btn{background:rgba(255,255,255,.06);color:#888;border:1px solid rgba(255,255,255,.08)}
#retry-btn:hover{background:rgba(255,255,255,.1);color:#bbb}

.particle{position:fixed;width:4px;height:4px;border-radius:50%;pointer-events:none;z-index:2}

@media(max-width:480px){
  #intro h1{font-size:1.6rem}
  #target{padding:12px 24px;font-size:.75rem}
  #result h2{font-size:1.4rem}
  .stat-row{padding:8px 12px}
}
</style>
</head>
<body>

<div id="intro">
  <h1>The Evasion</h1>
  <p>Click the button. It will try to escape. How long can you chase it before it lets you win?</p>
  <button class="btn" id="start-btn">Begin the Chase</button>
</div>

<div id="arena">
  <div id="hud">TIME <span id="timer">0.0</span>s &middot; NEAR MISSES <span id="misses">0</span></div>
  <div id="trail"></div>
  <button id="target">Catch Me</button>
</div>

<div id="result">
  <h2 id="r-title"></h2>
  <div class="subtitle" id="r-sub"></div>
  <div class="stats" id="r-stats"></div>
  <div class="verdict" id="r-verdict"></div>
  <button class="btn" id="retry-btn">Try Again</button>
</div>

<script>
const intro=document.getElementById('intro');
const arena=document.getElementById('arena');
const target=document.getElementById('target');
const timerEl=document.getElementById('timer');
const missesEl=document.getElementById('misses');
const trailEl=document.getElementById('trail');
const resultEl=document.getElementById('result');
const startBtn=document.getElementById('start-btn');
const retryBtn=document.getElementById('retry-btn');

let running=false,startTime=0,mouseX=0,mouseY=0,misses=0,clicks=0,nearMisses=0;
let tx=0,ty=0,velX=0,velY=0;
const FLEE_DIST=180,CATCH_DIST=30,MAX_VEL=12,SPEED_MULT=1.8;
let particles=[];

// Tracking
document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY});
document.addEventListener('touchmove',e=>{mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY},{passive:true});

function spawnParticle(x,y,c){
  const p=document.createElement('div');
  p.className='particle';
  p.style.cssText=`left:${x}px;top:${y}px;background:${c};opacity:0.7;transition:all .6s ease`;
  trailEl.appendChild(p);
  requestAnimationFrame(()=>{p.style.transform=`translate(${(Math.random()-.5)*40}px,${(Math.random()-.5)*40}px) scale(0)`;p.style.opacity='0'});
  setTimeout(()=>p.remove(),600);
}

function positionTarget(x,y){
  const rect=target.getBoundingClientRect();
  const bw=rect.width,bh=rect.height;
  tx=Math.max(10,Math.min(x-bw/2,window.innerWidth-bw-10));
  ty=Math.max(10,Math.min(y-bh/2,window.innerHeight-bh-10));
  target.style.transform=`translate(${tx}px,${ty}px)`;
}

function startGame(){
  intro.classList.add('gone');
  arena.classList.add('active');
  resultEl.classList.remove('show');
  running=true;startTime=Date.now();misses=0;clicks=0;nearMisses=0;velX=0;velY=0;
  positionTarget(window.innerWidth/2,window.innerHeight/2);
  requestAnimationFrame(gameLoop);
}

function gameLoop(){
  if(!running)return;
  const elapsed=(Date.now()-startTime)/1000;
  timerEl.textContent=elapsed.toFixed(1);

  // Button center
  const rect=target.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;

  // Distance to cursor
  const dx=mouseX-cx,dy=mouseY-cy;
  const dist=Math.sqrt(dx*dx+dy*dy);

  // Near miss detection
  if(dist<CATCH_DIST*3&&dist>CATCH_DIST){
    if(Math.random()<0.3){
      nearMisses++;
      missesEl.textContent=nearMisses;
      spawnParticle(cx,cy,'#ff6b6b');
    }
  }

  // Flee from cursor
  if(dist<FLEE_DIST&&dist>0){
    const urgency=1-dist/FLEE_DIST;
    // Add some randomness to evade pattern
    const angle=Math.atan2(-dy,-dx)+(Math.random()-.5)*1.2;
    velX+=Math.cos(angle)*urgency*SPEED_MULT;
    velY+=Math.sin(angle)*urgency*SPEED_MULT;
  }

  // Damping
  velX*=0.88;velY*=0.88;

  // Clamp
  const spd=Math.sqrt(velX*velX+velY*velY);
  if(spd>MAX_VEL){velX=velX/spd*MAX_VEL;velY=velY/spd*MAX_VEL}

  // Apply
  const nx=cx+velX,ny=cy+velY;
  const bw=rect.width,bh=rect.height;
  const clampX=Math.max(bw/2+10,Math.min(nx,window.innerWidth-bw/2-10));
  const clampY=Math.max(bh/2+10,Math.min(ny,window.innerHeight-bh/2-10));

  // Spawn trail on movement
  if(spd>3)spawnParticle(cx,cy,'rgba(255,107,107,0.5)');

  positionTarget(clampX,clampY);
  requestAnimationFrame(gameLoop);
}

function endGame(){
  running=false;
  const elapsed=(Date.now()-startTime)/1000;
  target.classList.add('caught');

  // Particles burst
  const rect=target.getBoundingClientRect();
  for(let i=0;i<20;i++){
    setTimeout(()=>spawnParticle(rect.left+rect.width/2,rect.top+rect.height/2,'#ffa36b'),i*30);
  }

  setTimeout(()=>showResult(elapsed),600);
}

function showResult(t){
  arena.classList.remove('active');

  // Absurd calculations
  const kmScrolled=(t*47.3).toFixed(1);
  const brainCells=(Math.floor(t*8.2)).toLocaleString();
  const dignity=Math.max(0,100-Math.floor(t*0.8));
  const rank=t<3?' apex predator':t<8?' determined hunter':t<20?' casual pursuer':t<45?' relaxed tracker':' enlightened observer';
  const title=t<3?'Unstoppable Force':t<8?'Relentless':t<15?'Persistent':t<25?'Steady':t<40?'Easygoing':'Transcendent';
  const color=t<3?'#ffe06b':t<8?'#ffa36b':t<15?'#ff6b6b':t<40?'#c084fc':'#818cf8';

  document.getElementById('r-title').textContent='You are '+title;
  document.getElementById('r-title').style.background=`linear-gradient(135deg,${color},#fff)`;
  document.getElementById('r-title').style.webkitBackgroundClip='text';
  document.getElementById('r-title').style.webkitTextFillColor='transparent';
  document.getElementById('r-sub').textContent='Completion time: '+t.toFixed(1)+'s'+rank;

  const verdicts=[
    t<3?`In ${t.toFixed(1)} seconds, you proved that nothing can escape your cursor. The button never stood a chance. Studies show people like you are 340% more likely to close tabs without reading them.`:
    t<8?`At ${t.toFixed(1)} seconds, you showed genuine determination. The button tried its best, but your reflexes are sharpened by years of clicking "accept all cookies" without reading.`:
    t<15?`Your ${t.toFixed(1)} second chase suggests a balanced approach to life. You pursue goals with moderate urgency, occasionally stopping to wonder why you started in the first place.`:
    t<30?`At ${t.toFixed(1)} seconds, you entered a meditative state. The chase became a dance. Some would call it giving up. You call it "strategic patience."`:
    `After ${t.toFixed(1)} seconds of peaceful coexistence, the button simply surrendered. It had never met someone so unbothered by evasion. You are one with the chaos.`
  ];

  document.getElementById('r-stats').innerHTML=[
    ['Virtual distance scrolled',kmScrolled+' km'],
    ['Brain cells recomputed',brainCells],
    ['Dignity preserved',dignity+'%'],
    ['Near misses',nearMisses.toString()],
    ['Button panic level',t<5?'SEVERE':t<15?'MODERATE':'NONE (it felt safe)'],
  ].map(([l,v])=>`<div class="stat-row"><span class="stat-label">${l}</span><span class="stat-value">${v}</span></div>`).join('');

  document.getElementById('r-verdict').textContent=verdicts[0];
  resultEl.classList.add('show');
}

target.addEventListener('click',e=>{
  e.stopPropagation();
  clicks++;
  const rect=target.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  const dist=Math.sqrt((mouseX-cx)**2+(mouseY-cy)**2);

  // Catch probability increases with time and near-misses
  const elapsed=(Date.now()-startTime)/1000;
  const catchChance=Math.min(0.95,0.1+elapsed*0.015+nearMisses*0.005);

  if(dist<CATCH_DIST*2||Math.random()<catchChance){
    endGame();
  }else{
    // Button laughs and flees harder
    const angle=Math.atan2(cy-mouseY,cx-mouseX)+(Math.random()-.5)*0.8;
    velX+=Math.cos(angle)*MAX_VEL*2;
    velY+=Math.sin(angle)*MAX_VEL*2;
    for(let i=0;i<5;i++)spawnParticle(cx,cy,'#ffa36b');
  }
});

target.addEventListener('touchstart',e=>{
  e.preventDefault();
  const touch=e.touches[0];
  mouseX=touch.clientX;mouseY=touch.clientY;
  target.click();
},{passive:false});

startBtn.addEventListener('click',startGame);
retryBtn.addEventListener('click',()=>{
  resultEl.classList.remove('show');
  target.classList.remove('caught');
  startGame();
});

// Prevent context menu on long press
target.addEventListener('contextmenu',e=>e.preventDefault());
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Shatter</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;overflow:hidden;font-family:'Inter',sans-serif;touch-action:none;-webkit-user-select:none;user-select:none}
canvas{display:block}
#ui{position:fixed;bottom:0;left:0;right:0;display:flex;flex-direction:column;align-items:center;padding:36px 20px 50px;pointer-events:none;gap:12px}
#prompt{color:rgba(255,255,255,.45);font-size:12px;font-weight:300;letter-spacing:.18em;text-transform:uppercase;transition:opacity .6s}
#prompt.hide{opacity:0;pointer-events:none}
.btns{display:flex;gap:10px}
.btn{pointer-events:auto;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.55);padding:10px 26px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:6px;opacity:0;transition:opacity .5s,background .2s,transform .15s;-webkit-tap-highlight-color:transparent}
.btn:hover{background:rgba(255,255,255,.1)}
.btn:active{transform:scale(.97)}
.btn.show{opacity:1}
#result{color:rgba(255,255,255,.35);font-size:11px;font-weight:300;letter-spacing:.06em;opacity:0;transition:opacity .6s;text-align:center;line-height:1.7}
#result.show{opacity:1}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <p id="prompt">tap the orb to release its light</p>
  <div class="btns">
    <button class="btn" id="btnAgain">Reform</button>
    <button class="btn" id="btnSave">Save</button>
  </div>
  <p id="result"></p>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const promptEl=document.getElementById('prompt'),btnAgain=document.getElementById('btnAgain'),btnSave=document.getElementById('btnSave'),resultEl=document.getElementById('result');
let W,H,oR,oCX,oCY,off,ox;
let state='intact',frags=[],sparks=[],shake=0,phase=0,flash=0;
const verdicts=['Catastrophic dissolution','Prismatic collapse','Spectral dispersion','Crystal annihilation','Light unbound','Total irradiance','Chromatic scatter','Luminous debris'];

function resize(){W=C.width=innerWidth;H=C.height=innerHeight;oR=Math.min(W,H)*.25;oCX=W/2;oCY=H/2-10;buildOrb()}

function buildOrb(){
  off=document.createElement('canvas');off.width=W;off.height=H;ox=off.getContext('2d');
  // Outer glow
  let g=ox.createRadialGradient(oCX,oCY,oR*.3,oCX,oCY,oR*2.2);
  g.addColorStop(0,'rgba(110,150,255,.1)');g.addColorStop(.5,'rgba(150,90,255,.03)');g.addColorStop(1,'transparent');
  ox.fillStyle=g;ox.fillRect(0,0,W,H);
  // Spectrum gradient body
  g=ox.createRadialGradient(oCX-oR*.12,oCY-oR*.12,0,oCX,oCY,oR);
  g.addColorStop(0,'#f0abfc');g.addColorStop(.14,'#c084fc');g.addColorStop(.28,'#818cf8');
  g.addColorStop(.42,'#38bdf8');g.addColorStop(.56,'#34d399');g.addColorStop(.7,'#fbbf24');
  g.addColorStop(.84,'#f87171');g.addColorStop(1,'#0a0a0f');
  ox.beginPath();ox.arc(oCX,oCY,oR,0,Math.PI*2);ox.fillStyle=g;ox.fill();
  // Glass highlight
  g=ox.createRadialGradient(oCX-oR*.28,oCY-oR*.32,0,oCX-oR*.1,oCY-oR*.15,oR*.5);
  g.addColorStop(0,'rgba(255,255,255,.32)');g.addColorStop(.5,'rgba(255,255,255,.06)');g.addColorStop(1,'transparent');
  ox.beginPath();ox.arc(oCX,oCY,oR,0,Math.PI*2);ox.fillStyle=g;ox.fill();
  // Edge ring
  ox.beginPath();ox.arc(oCX,oCY,oR-1,0,Math.PI*2);
  ox.strokeStyle='rgba(255,255,255,.12)';ox.lineWidth=1.5;ox.stroke();
}

function shatter(px,py){
  state='shatter';promptEl.classList.add('hide');shake=16;flash=.65;
  let dx=px-oCX,dy=py-oCY,d=Math.hypot(dx,dy);
  if(d>oR){px=oCX+dx/d*oR*.65;py=oCY+dy/d*oR*.65}

  const n=50+Math.floor(Math.random()*25);
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,r=Math.pow(Math.random(),.55)*oR*.9;
    const cx=oCX+r*Math.cos(a),cy=oCY+r*Math.sin(a);
    const nv=4+Math.floor(Math.random()*4),sz=5+Math.random()*14+((oR-r)/oR)*8;
    const verts=[];
    for(let v=0;v<nv;v++){
      const va=(v/nv)*Math.PI*2+(Math.random()-.5)*.9;
      const vr=sz*(.45+Math.random()*.55);
      verts.push({x:cx+vr*Math.cos(va),y:cy+vr*Math.sin(va)});
    }
    // Pre-compute bounding box offsets from center
    let bMinX=1e9,bMaxX=-1e9,bMinY=1e9,bMaxY=-1e9;
    verts.forEach(v=>{const lx=v.x-cx,ly=v.y-cy;if(lx<bMinX)bMinX=lx;if(lx>bMaxX)bMaxX=lx;if(ly<bMinY)bMinY=ly;if(ly>bMaxY)bMaxY=ly});
    const fdx=cx-px,fdy=cy-py,fa=Math.atan2(fdy,fdx);
    const force=3+Math.random()*10+5/(1+Math.hypot(fdx,fdy)*.007);
    frags.push({verts,cx,cy,x:0,y:0,vx:Math.cos(fa)*force+(Math.random()-.5)*2,vy:Math.sin(fa)*force-1.5-Math.random()*3.5,rot:0,vr:(Math.random()-.5)*.14,opacity:1,fadeDelay:Math.random()*100,bMinX,bMaxX,bMinY,bMaxY});
  }
  // Impact sparks
  for(let i=0;i<55;i++){
    const a=Math.random()*Math.PI*2,spd=2+Math.random()*9;
    sparks.push({x:px,y:py,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,life:1,decay:.01+Math.random()*.018,size:1+Math.random()*3.5,hue:Math.random()*360});
  }
  setTimeout(()=>{
    state='settled';
    btnAgain.classList.add('show');btnSave.classList.add('show');resultEl.classList.add('show');
    resultEl.innerHTML=verdicts[Math.floor(Math.random()*verdicts.length)]+'<br>'+frags.length+' fragments of light';
  },2800);
}

function reform(){
  state='fading';
  frags.forEach(f=>{f.fadeDelay=0});
  setTimeout(()=>{
    state='intact';frags=[];sparks=[];shake=0;flash=0;buildOrb();
    promptEl.classList.remove('hide');btnAgain.classList.remove('show');btnSave.classList.remove('show');resultEl.classList.remove('show');
  },250);
}

function update(){
  shake*=.87;flash*=.82;
  const G=.13;
  for(let i=frags.length-1;i>=0;i--){
    const f=frags[i];
    f.x+=f.vx;f.y+=f.vy;f.vy+=G;f.vx*=.995;f.rot+=f.vr;f.vr*=.985;
    if(f.cy+f.y+f.bMaxY>H){f.y=H-f.cy-f.bMaxY;f.vy*=-.35;f.vx*=.8;f.vr*=.6}
    const fl=f.cx+f.x+f.bMinX;if(fl<0){f.x=-f.cx-f.bMinX;f.vx*=-.3}
    const fr=f.cx+f.x+f.bMaxX;if(fr>W){f.x=W-f.cx-f.bMaxX;f.vx*=-.3}
    if(f.fadeDelay>0)f.fadeDelay--;else f.opacity-=.0007;
    if(f.opacity<=0)frags.splice(i,1);
  }
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];s.x+=s.vx;s.y+=s.vy;s.vy+=.04;s.life-=s.decay;
    if(s.life<=0)sparks.splice(i,1);
  }
}

function draw(){
  X.save();
  if(shake>.3)X.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
  X.fillStyle='#0a0a0f';X.fillRect(-20,-20,W+40,H+40);
  // Ambient glow
  const bg=X.createRadialGradient(oCX,oCY,0,oCX,oCY,oR*3);
  bg.addColorStop(0,'rgba(50,30,100,.07)');bg.addColorStop(1,'transparent');
  X.fillStyle=bg;X.fillRect(0,0,W,H);

  if(state==='intact'){
    phase+=.004;
    X.save();X.globalAlpha=.93+Math.sin(phase)*.07;X.drawImage(off,0,0);
    // Animated caustic highlight
    const ha=phase*.65,hx=oCX+oR*.22*Math.cos(ha),hy=oCY+oR*.22*Math.sin(ha);
    const hg=X.createRadialGradient(hx,hy,0,hx,hy,oR*.4);
    hg.addColorStop(0,'rgba(255,255,255,.11)');hg.addColorStop(1,'transparent');
    X.beginPath();X.arc(oCX,oCY,oR,0,Math.PI*2);X.fillStyle=hg;X.fill();
    // Second highlight offset
    const h2=phase*.4+2,hx2=oCX+oR*.18*Math.cos(h2),hy2=oCY+oR*.18*Math.sin(h2);
    const hg2=X.createRadialGradient(hx2,hy2,0,hx2,hy2,oR*.35);
    hg2.addColorStop(0,'rgba(255,200,255,.06)');hg2.addColorStop(1,'transparent');
    X.beginPath();X.arc(oCX,oCY,oR,0,Math.PI*2);X.fillStyle=hg2;X.fill();
    X.restore();
    // Pulsing ring
    X.save();X.globalAlpha=.08+Math.sin(phase*1.4)*.05;
    X.beginPath();X.arc(oCX,oCY,oR+5+Math.sin(phase*2)*3,0,Math.PI*2);
    X.strokeStyle='rgba(170,150,255,.5)';X.lineWidth=1.5;X.stroke();X.restore();
    // Title
    X.fillStyle='rgba(255,255,255,.85)';X.font='800 28px Inter';X.textAlign='center';
    X.fillText('Shatter',oCX,oCY-oR-48);
    X.fillStyle='rgba(255,255,255,.25)';X.font='300 11px Inter';
    X.fillText('T A P   T H E   O R B',oCX,oCY-oR-26);
  }

  // Fragments
  for(const f of frags){
    if(f.opacity<=0)continue;
    X.save();X.globalAlpha=f.opacity;
    const tx=f.cx+f.x,ty=f.cy+f.y;
    X.translate(tx,ty);X.rotate(f.rot);
    // Clip to fragment shape
    X.beginPath();
    f.verts.forEach((v,i)=>{const lx=v.x-f.cx,ly=v.y-f.cy;X[i?'lineTo':'moveTo'](lx,ly)});
    X.closePath();X.clip();
    // Draw orb texture through clip
    X.drawImage(off,-f.cx,-f.cy);
    // Glass edge highlight
    X.globalAlpha=f.opacity*.22;X.strokeStyle='rgba(255,255,255,.9)';X.lineWidth=.6;
    X.beginPath();
    f.verts.forEach((v,i)=>{const lx=v.x-f.cx,ly=v.y-f.cy;X[i?'lineTo':'moveTo'](lx,ly)});
    X.closePath();X.stroke();
    X.restore();
  }

  // Sparks
  for(const s of sparks){
    X.save();X.globalAlpha=s.life*s.life;
    X.shadowColor='hsla('+s.hue+',85%,60%,.5)';X.shadowBlur=6;
    X.fillStyle='hsla('+s.hue+',85%,75%,1)';
    X.beginPath();X.arc(s.x,s.y,s.size*s.life,0,Math.PI*2);X.fill();
    X.restore();
  }

  // Flash
  if(flash>.01){X.save();X.globalAlpha=flash;X.fillStyle='#fff';X.fillRect(0,0,W,H);X.restore()}
  X.restore();
}

function loop(){if(state!=='intact')update();draw();requestAnimationFrame(loop)}
C.addEventListener('pointerdown',e=>{if(state==='intact')shatter(e.clientX,e.clientY)});
btnAgain.addEventListener('click',reform);
btnSave.addEventListener('click',()=>{const a=document.createElement('a');a.download='shatter.png';a.href=C.toDataURL();a.click()});
addEventListener('resize',resize);
resize();loop();
</script>
</body>
</html>

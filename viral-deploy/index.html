<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drift</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;overflow:hidden;font-family:'Inter',sans-serif;cursor:crosshair}
canvas{display:block;position:fixed;inset:0}

#ui{position:fixed;top:20px;left:20px;z-index:10;pointer-events:none}
#ui h1{font-size:1.1rem;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.04em}
#ui p{font-size:.7rem;color:rgba(255,255,255,.3);margin-top:4px}

#controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:10px;align-items:center}
.btn{font-family:'Inter',sans-serif;font-size:.72rem;font-weight:400;padding:8px 18px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.08);border-radius:6px;cursor:pointer;transition:all .3s;pointer-events:all;backdrop-filter:blur(8px);letter-spacing:.03em}
.btn:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);border-color:rgba(255,255,255,.15)}
.btn:active{transform:scale(.96)}

#palette-indicator{position:fixed;top:20px;right:20px;z-index:10;display:flex;gap:5px;pointer-events:none}
.swatch{width:12px;height:12px;border-radius:50%;border:1px solid rgba(255,255,255,.1);transition:all .5s}

#stats{position:fixed;bottom:20px;right:20px;z-index:10;font-size:.65rem;color:rgba(255,255,255,.2);pointer-events:none;text-align:right}

.hidden{display:none!important}

@media(max-width:600px){
  #ui h1{font-size:.9rem}
  #controls{bottom:16px;gap:8px}
  .btn{padding:7px 14px;font-size:.68rem}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <h1>Drift</h1>
  <p>click to seed the flow</p>
</div>
<div id="palette-indicator"></div>
<div id="controls">
  <button class="btn" id="btn-clear">Clear</button>
  <button class="btn" id="btn-palette">Palette</button>
  <button class="btn" id="btn-density">Density</button>
  <button class="btn" id="btn-save">Save</button>
</div>
<div id="stats"></div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();
window.addEventListener('resize',resize);

// Simplex-like noise (compact permutation-based)
const P=new Uint8Array(512);
for(let i=0;i<256;i++)P[i]=i;
for(let i=255;i>0;i--){const j=Math.floor(Math.random()*(i+1));[P[i],P[j]]=[P[j],P[i]]}
for(let i=0;i<256;i++)P[i+256]=P[i];

function fade(t){return t*t*t*(t*(t*6-15)+10)}
function lerp(a,b,t){return a+t*(b-a)}
function grad2(h,x,y){const v=h&3;return((v&1)?-x:x)+((v&2)?-y:y)}
function noise2(x,y){
  const X=Math.floor(x)&255,Y=Math.floor(y)&255;
  x-=Math.floor(x);y-=Math.floor(y);
  const u=fade(x),v=fade(y);
  const a=P[X]+Y,b=P[X+1]+Y;
  return lerp(lerp(grad2(P[a],x,y),grad2(P[b],x-1,y),u),lerp(grad2(P[a+1],x,y-1),grad2(P[b+1],x-1,y-1),u),v)
}

// Color palettes
const palettes=[
  {name:'Ember',colors:['#ff6b35','#f7931e','#ffd700','#ff4500','#c41e3a']},
  {name:'Ocean',colors:['#0077b6','#00b4d8','#48cae4','#90e0ef','#caf0f8']},
  {name:'Aurora',colors:['#a855f7','#6366f1','#3b82f6','#06b6d4','#34d399']},
  {name:'Sakura',colors:['#f472b6','#ec4899','#db2777','#f9a8d4','#fce7f3']},
  {name:'Forest',colors:['#22c55e','#16a34a','#84cc16','#a3e635','#d9f99d']},
  {name:'Midnight',colors:['#818cf8','#a78bfa','#c084fc','#e879f9','#f0abfc']},
];
let paletteIdx=2;
let palette=palettes[paletteIdx];

// Flow field parameters
let zOff=0;
const SCALE=0.003;
const PARTICLE_SPEED=1.2;
const NOISE_STRENGTH=Math.PI*2;
let density=1; // multiplier
let seeds=[];

function updateSwatches(){
  const el=document.getElementById('palette-indicator');
  el.innerHTML='';
  palette.colors.forEach(c=>{
    const d=document.createElement('div');
    d.className='swatch';
    d.style.background=c;
    el.appendChild(d);
  });
}
updateSwatches();

// Particles
class Particle{
  constructor(){this.reset()}
  reset(){
    this.x=Math.random()*W;
    this.y=Math.random()*H;
    this.prevX=this.x;
    this.prevY=this.y;
    this.life=Math.random()*200+100;
    this.maxLife=this.life;
    const ci=Math.floor(Math.random()*palette.colors.length);
    this.color=palette.colors[ci];
    this.speed=PARTICLE_SPEED*(0.7+Math.random()*0.6);
    this.width=Math.random()*1.5+0.3;
  }
  update(){
    this.prevX=this.x;
    this.prevY=this.y;
    // Noise angle
    let angle=noise2(this.x*SCALE,this.y*SCALE+zOff)*NOISE_STRENGTH;
    // Seed attraction
    for(const s of seeds){
      const dx=s.x-this.x,dy=s.y-this.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<200&&d>1){
        const influence=(1-d/200)*s.strength;
        angle+=Math.atan2(dy,dx)*influence*0.5;
      }
    }
    this.x+=Math.cos(angle)*this.speed;
    this.y+=Math.sin(angle)*this.speed;
    this.life--;
    if(this.life<=0||this.x<-10||this.x>W+10||this.y<-10||this.y>H+10)this.reset();
  }
  draw(){
    const alpha=Math.min(1,this.life/this.maxLife,(this.maxLife-this.life)/20)*0.35;
    ctx.beginPath();
    ctx.moveTo(this.prevX,this.prevY);
    ctx.lineTo(this.x,this.y);
    ctx.strokeStyle=this.color+Math.round(alpha*255).toString(16).padStart(2,'0');
    ctx.lineWidth=this.width;
    ctx.lineCap='round';
    ctx.stroke();
  }
}

const BASE_COUNT=800;
let particles=[];
function initParticles(){
  const count=Math.round(BASE_COUNT*density);
  particles=[];
  for(let i=0;i<count;i++)particles.push(new Particle());
}
initParticles();

// Seed class
class Seed{
  constructor(x,y){this.x=x;this.y=y;this.strength=2;this.life=400}
  update(){this.strength*=0.997;this.life--;return this.life>0&&this.strength>0.05}
}

// Fade trail
function fadeTrail(){
  ctx.fillStyle='rgba(10,10,15,0.008)';
  ctx.fillRect(0,0,W,H);
}

// Animation loop
let running=true;
let frameCount=0;
function animate(){
  if(!running)return;
  fadeTrail();
  zOff+=0.0003;
  seeds=seeds.filter(s=>s.update());
  for(const p of particles){
    p.update();
    p.draw();
  }
  frameCount++;
  if(frameCount%60===0){
    document.getElementById('stats').textContent=particles.length+' particles · '+seeds.length+' seeds';
  }
  requestAnimationFrame(animate);
}
animate();

// Interaction
canvas.addEventListener('click',e=>{
  seeds.push(new Seed(e.clientX,e.clientY));
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  for(const t of e.changedTouches)seeds.push(new Seed(t.clientX,t.clientY));
},{passive:false});
// Drag to paint seeds
let isDown=false;
canvas.addEventListener('mousedown',()=>isDown=true);
window.addEventListener('mouseup',()=>isDown=false);
canvas.addEventListener('mousemove',e=>{
  if(isDown&&Math.random()<0.3)seeds.push(new Seed(e.clientX,e.clientY));
});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(Math.random()<0.3)seeds.push(new Seed(t.clientX,t.clientY));
  }
},{passive:false});

// Controls
document.getElementById('btn-clear').addEventListener('click',e=>{
  e.stopPropagation();
  ctx.fillStyle='#0a0a0f';
  ctx.fillRect(0,0,W,H);
  seeds=[];
  initParticles();
  zOff=0;
});

document.getElementById('btn-palette').addEventListener('click',e=>{
  e.stopPropagation();
  paletteIdx=(paletteIdx+1)%palettes.length;
  palette=palettes[paletteIdx];
  updateSwatches();
  // Recolor existing particles gradually
  particles.forEach(p=>{
    const ci=Math.floor(Math.random()*palette.colors.length);
    p.color=palette.colors[ci];
  });
});

const densities=[0.5,1,1.5,2];
let densIdx=1;
document.getElementById('btn-density').addEventListener('click',e=>{
  e.stopPropagation();
  densIdx=(densIdx+1)%densities.length;
  density=densities[densIdx];
  initParticles();
  e.target.textContent='Density '+Math.round(density*100)+'%';
});
document.getElementById('btn-density').textContent='Density '+Math.round(density*100)+'%';

document.getElementById('btn-save').addEventListener('click',e=>{
  e.stopPropagation();
  const link=document.createElement('a');
  link.download='drift-'+Date.now()+'.png';
  link.href=canvas.toDataURL();
  link.click();
});
</script>
</body>
</html>

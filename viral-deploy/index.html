<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Void Hum</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#0a0a0f;font-family:'Inter',sans-serif;color:#e0e0e0;touch-action:none;user-select:none}
canvas{position:fixed;inset:0;width:100%;height:100%}

#tuner{position:fixed;bottom:48px;left:12%;right:12%;height:2px;background:rgba(255,255,255,.06);border-radius:1px;z-index:10;cursor:pointer}
#tuner::before{content:'';position:absolute;top:-14px;left:0;right:0;height:30px}
.tick{position:absolute;top:-5px;width:1px;height:12px;background:rgba(255,255,255,.08);transform:translateX(-50%);pointer-events:none;transition:background .6s}
.tick.found{background:rgba(255,255,255,.25)}

#knob{position:absolute;top:50%;width:18px;height:18px;border-radius:50%;background:#fff;transform:translate(-50%,-50%);cursor:grab;box-shadow:0 0 20px rgba(255,255,255,.25),0 0 60px rgba(255,255,255,.08);transition:box-shadow .2s;z-index:11}
#knob.active{cursor:grabbing;box-shadow:0 0 30px rgba(255,255,255,.4),0 0 80px rgba(255,255,255,.15)}

#freq-display{position:fixed;bottom:66px;left:50%;transform:translateX(-50%);font-size:12px;font-weight:300;letter-spacing:4px;color:rgba(255,255,255,.18);z-index:10;text-align:center;pointer-events:none;font-variant-numeric:tabular-nums}

#transmission{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(14px,3vw,21px);font-weight:200;letter-spacing:.5px;color:rgba(255,255,255,0);text-align:center;max-width:460px;line-height:2.1;z-index:5;pointer-events:none;transition:color 2s ease;padding:0 24px}
#transmission.visible{color:rgba(255,255,255,.6)}

#found{position:fixed;top:20px;right:20px;font-size:11px;font-weight:300;letter-spacing:2px;color:rgba(255,255,255,.12);z-index:10;pointer-events:none}
#title{position:fixed;top:20px;left:20px;font-size:11px;font-weight:600;letter-spacing:3px;color:rgba(255,255,255,.1);z-index:10;pointer-events:none;text-transform:uppercase}
#hint{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:300;letter-spacing:1.5px;color:rgba(255,255,255,.1);z-index:10;pointer-events:none;transition:opacity 1.5s ease}
#decoded{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:300;letter-spacing:3px;color:rgba(255,255,255,0);z-index:10;pointer-events:none;transition:color 3s ease;text-transform:uppercase}
#decoded.visible{color:rgba(255,255,255,.15)}

@media(max-width:480px){
  #tuner{left:6%;right:6%}
  #found,#title{font-size:10px;letter-spacing:1.5px}
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="title">Void Hum</div>
<div id="found">0 / 5</div>
<div id="freq-display">97.5 MHz</div>
<div id="hint">drag to tune</div>
<div id="decoded">all signals decoded</div>
<div id="transmission"></div>
<div id="tuner"><div id="knob"></div></div>

<script>
const C = document.getElementById('c');
const X = C.getContext('2d');
const knob = document.getElementById('knob');
const tuner = document.getElementById('tuner');
const freqEl = document.getElementById('freq-display');
const transEl = document.getElementById('transmission');
const foundEl = document.getElementById('found');
const hintEl = document.getElementById('hint');
const decEl = document.getElementById('decoded');

let W, H, freq = 0.5, t = 0, drag = false, hintOn = true;
const foundSet = new Set();

const signals = [
  { f: 0.08, msg: "A garden grows in the space between heartbeats." },
  { f: 0.28, msg: "The last lighthouse keeper forgot to turn off the light." },
  { f: 0.50, msg: "Somewhere, a version of you just put down their phone." },
  { f: 0.72, msg: "The ocean remembers every raindrop that ever touched it." },
  { f: 0.91, msg: "You have been here before. You just do not remember yet." },
];

// Color palette: frequency -> hue stops with smooth transitions
const stops = [[240,45,55],[280,55,55],[165,50,50],[35,60,55],[5,55,50]];

function lerpH(a, b, t) {
  let dh = b[0] - a[0];
  if (dh > 180) dh -= 360;
  if (dh < -180) dh += 360;
  return [a[0]+dh*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t];
}

function col(f) {
  f = Math.max(0, Math.min(1, f));
  const s = f * (stops.length - 1);
  const i = Math.min(Math.floor(s), stops.length - 2);
  return lerpH(stops[i], stops[i+1], s - i);
}

// Particles
const N = 160;
const P = [];

function resize() {
  W = C.width = innerWidth;
  H = C.height = innerHeight;
  P.length = 0;
  for (let i = 0; i < N; i++) {
    P.push({
      bx: Math.random() * W, by: Math.random() * H,
      x: 0, y: 0,
      ph: Math.random() * Math.PI * 2,
      sz: Math.random() * 1.4 + 0.5,
      sp: Math.random() * 0.5 + 0.75,
    });
  }
}

function toMHz(f) { return (87.5 + f * 20.5).toFixed(1); }

function setFreq(f) {
  freq = Math.max(0, Math.min(1, f));
  knob.style.left = freq * 100 + '%';
  freqEl.textContent = toMHz(freq) + ' MHz';

  let near = null, nearD = 1;
  for (const s of signals) {
    const d = Math.abs(freq - s.f);
    if (d < 0.04) {
      foundSet.add(s.f);
      if (d < nearD) { near = s; nearD = d; }
      // Mark tick as found
      const ticks = tuner.querySelectorAll('.tick');
      for (const tk of ticks) {
        if (Math.abs(parseFloat(tk.style.left) / 100 - s.f) < 0.015)
          tk.classList.add('found');
      }
    }
  }

  transEl.classList.toggle('visible', !!(near && nearD < 0.02));
  if (near && nearD < 0.02) transEl.textContent = near.msg;

  foundEl.textContent = foundSet.size + ' / 5';
  if (foundSet.size === 5) decEl.classList.add('visible');
}

function render() {
  t++;
  const c = col(freq);
  const h = c[0], s = c[1], l = c[2];

  // Trail fade
  X.fillStyle = `rgba(10,10,15,${0.06 + freq * 0.12})`;
  X.fillRect(0, 0, W, H);

  // Ambient bg glow
  const bg = X.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.5);
  bg.addColorStop(0, `hsla(${h},${s}%,${Math.max(1,l*0.25)}%,0.015)`);
  bg.addColorStop(1, 'rgba(10,10,15,0)');
  X.fillStyle = bg;
  X.fillRect(0, 0, W, H);

  // Particle motion params
  const spd = 0.0003 + freq * 0.0025;
  const amp = 15 + freq * 190;
  const wn = 1.2 + freq * 5.5;
  const t2 = t * spd;

  for (const p of P) {
    const pt = t2 * p.sp;
    p.x = p.bx + amp * Math.sin(wn * p.ph + pt);
    p.y = p.by + amp * Math.cos(wn * p.ph * 1.3 + pt * 0.7) * (0.4 + freq * 0.6);

    // Spiral effect near transmissions
    for (const sg of signals) {
      const d = Math.abs(freq - sg.f);
      if (d < 0.04) {
        const str = (1 - d / 0.04) * 55;
        const ang = Math.atan2(p.by - H/2, p.bx - W/2) + t * 0.008;
        p.x += Math.cos(ang) * str * Math.sin(t * 0.004);
        p.y += Math.sin(ang) * str * Math.sin(t * 0.004);
      }
    }

    p.x = ((p.x % W) + W) % W;
    p.y = ((p.y % H) + H) % H;

    const a = 0.25 + Math.sin(pt + p.ph) * 0.2;
    const sz = Math.max(0.1, p.sz * (0.6 + freq * 0.9));
    const ph = p.ph * 12;

    // Soft glow
    X.beginPath();
    X.arc(p.x, p.y, sz * 3.5, 0, Math.PI * 2);
    X.fillStyle = `hsla(${h+ph},${s}%,${l}%,${Math.max(0,a*0.06)})`;
    X.fill();

    // Core
    X.beginPath();
    X.arc(p.x, p.y, sz, 0, Math.PI * 2);
    X.fillStyle = `hsla(${h+ph},${s}%,${Math.min(90,l+18)}%,${Math.max(0,a)})`;
    X.fill();
  }

  // Connections
  const cd = freq < 0.12 ? 0 : 30 + Math.sin(freq * Math.PI) * 80;
  if (cd > 20) {
    const md2 = cd * cd;
    X.lineWidth = 0.3;
    for (let i = 0; i < N; i++) {
      for (let j = i + 1; j < N; j++) {
        const dx = P[i].x - P[j].x;
        if (dx > cd || dx < -cd) continue;
        const dy = P[i].y - P[j].y;
        const d2 = dx * dx + dy * dy;
        if (d2 < md2) {
          const a = (1 - d2 / md2) * 0.07;
          X.beginPath();
          X.moveTo(P[i].x, P[i].y);
          X.lineTo(P[j].x, P[j].y);
          X.strokeStyle = `hsla(${h},${s}%,${l}%,${a})`;
          X.stroke();
        }
      }
    }
  }

  // Transmission center glow
  for (const sg of signals) {
    const d = Math.abs(freq - sg.f);
    if (d < 0.025) {
      const str = (1 - d / 0.025) * 0.025;
      const g = X.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.min(W,H)*0.35);
      g.addColorStop(0, `rgba(255,255,255,${str})`);
      g.addColorStop(1, 'rgba(255,255,255,0)');
      X.fillStyle = g;
      X.fillRect(0, 0, W, H);
    }
  }

  // Vignette
  const vig = X.createRadialGradient(W/2, H/2, Math.min(W,H)*0.3, W/2, H/2, Math.max(W,H)*0.75);
  vig.addColorStop(0, 'rgba(10,10,15,0)');
  vig.addColorStop(1, 'rgba(10,10,15,0.3)');
  X.fillStyle = vig;
  X.fillRect(0, 0, W, H);

  requestAnimationFrame(render);
}

// Add signal tick marks
signals.forEach(s => {
  const tk = document.createElement('div');
  tk.className = 'tick';
  tk.style.left = s.f * 100 + '%';
  tuner.insertBefore(tk, knob);
});

// Input — unified pointer events with capture
tuner.addEventListener('pointerdown', e => {
  drag = true;
  knob.classList.add('active');
  tuner.setPointerCapture(e.pointerId);
  onMove(e.clientX);
  e.preventDefault();
});
tuner.addEventListener('pointermove', e => { if (drag) onMove(e.clientX); });
tuner.addEventListener('pointerup', () => { drag = false; knob.classList.remove('active'); });
tuner.addEventListener('pointercancel', () => { drag = false; knob.classList.remove('active'); });

function onMove(cx) {
  const r = tuner.getBoundingClientRect();
  setFreq((cx - r.left) / r.width);
  if (hintOn) { hintEl.style.opacity = '0'; hintOn = false; }
}

window.addEventListener('resize', resize);
resize();
setFreq(0.5);
render();
</script>
</body>
</html>

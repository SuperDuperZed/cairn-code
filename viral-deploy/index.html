<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Fade</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:#0a0a0f;color:#e0e0e0;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center}
#app{width:100%;max-width:520px;padding:24px;text-align:center;position:relative}

#intro{text-align:center}
#intro h1{font-size:clamp(32px,8vw,56px);font-weight:800;letter-spacing:-2px;line-height:1.1;margin-bottom:16px;color:#e8e8e8}
#intro p{font-size:clamp(14px,2.5vw,17px);color:#555;font-weight:300;line-height:1.7;max-width:360px;margin:0 auto 32px}
.btn{padding:16px 48px;background:#fff;color:#0a0a0f;border:none;border-radius:80px;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:transform .2s,opacity .3s;letter-spacing:.3px}
.btn:hover{transform:scale(1.03)}
.btn:active{transform:scale(.97)}
.btn-small{padding:10px 28px;font-size:13px;font-weight:500;background:transparent;color:#666;border:1px solid rgba(255,255,255,.12);margin-top:24px;opacity:0;transition:opacity .8s ease 1s,transform .2s,border-color .3s}
.btn-small:hover{border-color:rgba(255,255,255,.3);color:#999}

#hold{display:none;position:fixed;inset:0;z-index:10;cursor:default;touch-action:none}
#hold-bg{position:absolute;inset:0;background:#0a0a0f;transition:background 2s ease}
#hold-text{position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.phase-text{font-size:clamp(24px,6vw,42px);font-weight:300;letter-spacing:-1px;opacity:0;transition:opacity 1.5s ease;line-height:1.4;max-width:420px}
.phase-text.visible{opacity:1}
.phase-sub{font-size:clamp(11px,2vw,13px);color:#444;font-weight:400;margin-top:24px;letter-spacing:.5px;opacity:0;transition:opacity 1.5s ease .5s}
.phase-sub.visible{opacity:1}
.progress-ring{position:absolute;bottom:clamp(40px,8vh,80px);width:48px;height:48px;opacity:.15}
.progress-ring circle{fill:none;stroke:#fff;stroke-width:1}
.progress-ring .track{stroke:rgba(255,255,255,.06)}

#result{display:none;text-align:center;opacity:0;transition:opacity 1s ease}
.result-time{font-size:clamp(64px,16vw,110px);font-weight:800;letter-spacing:-4px;line-height:1;margin-bottom:4px}
.result-unit{font-size:14px;font-weight:400;color:#666;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px}
.result-label{font-size:clamp(20px,5vw,32px);font-weight:700;letter-spacing:-.5px;margin-bottom:12px}
.result-desc{font-size:clamp(13px,2.5vw,16px);color:#888;font-weight:300;line-height:1.7;max-width:380px;margin:0 auto 32px}
.result-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin:0 auto 32px;max-width:400px}
.stat{padding:16px 8px;border:1px solid rgba(255,255,255,.06);border-radius:12px}
.stat-val{font-size:22px;font-weight:700;margin-bottom:2px}
.stat-lbl{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px}
</style>
</head>
<body>
<div id="app">
  <div id="intro">
    <h1>The Fade</h1>
    <p>Touch the screen and hold. Do not let go. We will measure how long you can stay.</p>
    <button class="btn" id="start-btn">Begin</button>
  </div>
  <div id="hold">
    <div id="hold-bg"></div>
    <div id="hold-text">
      <div class="phase-text" id="pt"></div>
      <div class="phase-sub" id="ps"></div>
      <svg class="progress-ring" viewBox="0 0 48 48"><circle class="track" cx="24" cy="24" r="20"/><circle id="pr" cx="24" cy="24" r="20" stroke-dasharray="125.7" stroke-dashoffset="0"/></svg>
    </div>
  </div>
  <div id="result">
    <div class="result-time" id="rt"></div>
    <div class="result-unit">seconds</div>
    <div class="result-label" id="rl"></div>
    <div class="result-desc" id="rd"></div>
    <div class="result-stats" id="rs"></div>
    <button class="btn btn-small" id="again-btn">Try Again</button>
  </div>
</div>

<script>
const phases=[
  {t:0,e:3,text:'Stay.',sub:'',bg:'#0a0a0f'},
  {t:3,e:6,text:'You are still here.',sub:'most people let go by now',bg:'#0c0c14'},
  {t:6,e:10,text:'Why?',sub:'',bg:'#0e0e1a'},
  {t:10,e:15,text:'This is not a test.',sub:'there is no prize',bg:'#0a0f0a'},
  {t:15,e:22,text:'What are you waiting for?',sub:'',bg:'#0f0a0a'},
  {t:22,e:30,text:'.',sub:'you are in the top 3%',bg:'#0a0a12'},
  {t:30,e:40,text:'You are still holding.',sub:'we noticed',bg:'#100a10'},
  {t:40,e:55,text:'Okay.',sub:'we see you',bg:'#0a0a0f'},
  {t:55,e:75,text:'This is devotion.',sub:'or stubbornness',bg:'#0a0f12'},
  {t:75,e:120,text:'...','you have gone too far',bg:'#0a0a0f'},
  {t:120,e:9999,text:'There is nothing left.','we are not sure what to say',bg:'#0a0a0f'}
];

const results=[
  {min:0,max:2,label:'Impatient',desc:'You have places to be. Things to do. A life that cannot wait for a dark screen to entertain you. The modern condition, distilled.',color:'#ff6b6b',
   stats:[{v:'0.8s',l:'avg hold'},{v:'23%',l:'patience'},{v:'fast',l:'decision'}]},
  {min:2,max:6,label:'Curious but Cautious',desc:'You wanted to see what happens, but not badly enough to commit. A healthy skepticism. You give things a chance, but you know when to walk away.',color:'#ffa94d',
   stats:[{v:'3.2s',l:'avg hold'},{v:'47%',l:'patience'},{v:'moderate',l:'trust'}]},
  {min:6,max:15,label:'Committed Observer',desc:'You stayed long enough for the tension to mean something. You can endure discomfort for the promise of a reveal. This is a rare quality.',color:'#ffd43b',
   stats:[{v:'9.1s',l:'avg hold'},{v:'68%',l:'patience'},{v:'deep',l:'focus'}]},
  {min:15,max:30,label:'Devoted',desc:'You held on through the silence, through the nothing. Most people need constant stimulation. You can sit with uncertainty. This makes you dangerous.',color:'#69db7c',
   stats:[{v:'21s',l:'avg hold'},{v:'84%',l:'patience'},{v:'iron',l:'will'}]},
  {min:30,max:60,label:'Unbreakable',desc:'One minute of pure nothing, and you did not flinch. You have the patience of a saint or the stubbornness of a stone. Either way, the screen could not make you leave.',color:'#4dabf7',
   stats:[{v:'42s',l:'avg hold'},{v:'93%',l:'patience'},{v:'steel',l:'nerve'}]},
  {min:60,max:120,label:'Beyond the Test',desc:'You held for over a minute. At this point, you are not following instructions. You are making a statement. The screen is not testing you. You are testing it.',color:'#da77f2',
   stats:[{v:'78s',l:'avg hold'},{v:'99%',l:'patience'},{v:'void',l:'category'}]},
  {min:120,max:99999,label:'The Eternal',desc:'Two minutes. You held a dark screen for two minutes. There is no word for what you are. Statistically, you should not exist. You are an anomaly. A glitch in the attention economy.',color:'#e599f7',
   stats:[{v:'0.01%',l:'of people'},{v:'infinite',l:'patience'},{v:'???',l:'type'}]}
];

let holdStart=0,holdTimer=null,currentPhase=-1,animFrame=null;

document.getElementById('start-btn').addEventListener('click',()=>{
  document.getElementById('intro').style.display='none';
  const hold=document.getElementById('hold');
  hold.style.display='block';
  holdStart=Date.now();
  currentPhase=-1;
  updateHold();
});

function startHold(){
  if(holdStart)return;
  document.getElementById('intro').style.display='none';
  const hold=document.getElementById('hold');
  hold.style.display='block';
  holdStart=Date.now();
  currentPhase=-1;
  updateHold();
}

function endHold(){
  if(!holdStart)return;
  const duration=(Date.now()-holdStart)/1000;
  holdStart=0;
  cancelAnimationFrame(animFrame);
  document.getElementById('hold').style.display='none';
  showResult(duration);
}

const holdEl=document.getElementById('hold');
holdEl.addEventListener('mousedown',e=>{e.preventDefault()});
holdEl.addEventListener('touchstart',e=>{e.preventDefault()},{passive:false});

function updateHold(){
  const elapsed=(Date.now()-holdStart)/1000;
  
  // Find current phase
  let phaseIdx=-1;
  for(let i=0;i<phases.length;i++){
    if(elapsed>=phases[i].t&&elapsed<phases[i].e){phaseIdx=i;break}
  }
  if(phaseIdx===-1)phaseIdx=phases.length-1;
  
  if(phaseIdx!==currentPhase){
    currentPhase=phaseIdx;
    const p=phases[phaseIdx];
    const pt=document.getElementById('pt');
    const ps=document.getElementById('ps');
    pt.classList.remove('visible');
    ps.classList.remove('visible');
    setTimeout(()=>{
      pt.textContent=p.text;
      ps.textContent=p.sub;
      pt.classList.add('visible');
      ps.classList.add('visible');
    },200);
    document.getElementById('hold-bg').style.background=p.bg;
  }
  
  // Progress ring
  const maxDisplay=120;
  const pct=Math.min(elapsed/maxDisplay,1);
  document.getElementById('pr').setAttribute('stroke-dashoffset',125.7*(1-pct));
  
  if(holdStart)animFrame=requestAnimationFrame(updateHold);
}

// Release detection
document.addEventListener('mouseup',()=>{if(holdStart)endHold()});
document.addEventListener('touchend',()=>{if(holdStart)endHold()});
document.addEventListener('touchcancel',()=>{if(holdStart)endHold()});

function showResult(seconds){
  const s=Math.round(seconds*10)/10;
  const result=results.find(r=>s>=r.min&&s<r.max)||results[results.length-1];
  
  const el=document.getElementById('result');
  el.style.display='block';
  
  document.getElementById('rt').textContent=s<10?s.toFixed(1):Math.round(s);
  document.getElementById('rt').style.color=result.color;
  
  document.getElementById('rl').textContent=result.label;
  document.getElementById('rl').style.color=result.color;
  
  document.getElementById('rd').textContent=result.desc;
  
  // Stats
  const statsEl=document.getElementById('rs');
  statsEl.innerHTML=result.stats.map(st=>`
    <div class="stat"><div class="stat-val" style="color:${result.color}">${st.v}</div><div class="stat-lbl">${st.l}</div></div>
  `).join('');
  
  // Animate in
  requestAnimationFrame(()=>{
    el.style.opacity='1';
    const btn=document.getElementById('again-btn');
    btn.style.opacity='1';
  });
}

document.getElementById('again-btn').addEventListener('click',()=>{
  const el=document.getElementById('result');
  el.style.opacity='0';
  document.getElementById('again-btn').style.opacity='0';
  setTimeout(()=>{
    el.style.display='none';
    document.getElementById('intro').style.display='block';
  },400);
});
</script>
</body>
</html>

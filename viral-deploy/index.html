<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Resonance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0f;overflow:hidden;height:100dvh;width:100vw;font-family:'Inter',sans-serif;color:#e0e0e0}
canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%;touch-action:none}
#ui{position:fixed;top:0;left:0;right:0;z-index:2;padding:20px 24px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none}
#title{font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.35)}
#count{font-size:11px;font-weight:400;color:rgba(255,255,255,.2)}
#hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:2;font-size:12px;color:rgba(255,255,255,.15);pointer-events:none;transition:opacity .6s;text-align:center}
#start-overlay{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0f}
#start-overlay h1{font-size:clamp(36px,8vw,56px);font-weight:800;letter-spacing:-2px;margin-bottom:12px}
#start-overlay p{font-size:14px;color:#555;font-weight:300;max-width:320px;text-align:center;line-height:1.7;margin-bottom:32px}
.start-btn{padding:14px 40px;background:#fff;color:#0a0a0f;border:none;border-radius:60px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;pointer-events:all;transition:transform .2s}
.start-btn:active{transform:scale(.95)}
#share-btn{position:fixed;bottom:24px;right:24px;z-index:3;padding:8px 18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);border-radius:40px;font-family:'Inter',sans-serif;font-size:11px;cursor:pointer;opacity:0;transition:opacity .4s}
#share-btn:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="start-overlay">
  <h1>Resonance</h1>
  <p>Tap the canvas to place sound nodes. Each one sings a note. Together they compose. Drag to move. Double-tap to remove.</p>
  <button class="start-btn" id="start-btn">Enter</button>
</div>
<div id="ui"><div><div id="title">Resonance</div><div id="count"></div></div></div>
<div id="hint">tap to place a node</div>
<button id="share-btn">Save Image</button>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,dpr,nodes=[],ripples=[],audioCtx,started=false,dragging=null,dragOff={x:0,y:0},lastTap=0;

const NOTES=[130.81,146.83,164.81,196,220,261.63,293.66,329.63,392,440,523.25,587.33];
const COLORS=['#ff6b6b','#ffa94d','#ffd43b','#69db7c','#4dabf7','#da77f2','#ff8787','#f08c00','#94d82d','#38d9a9','#748ffc','#e599f7'];

function resize(){
  dpr=window.devicePixelRatio||1;
  W=innerWidth;H=innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();addEventListener('resize',resize);

function initAudio(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  audioCtx.resume();
}

function getNoteIndex(x,y){
  const nx=x/W,ny=y/H;
  return Math.min(11,Math.max(0,Math.floor(nx*12)));
}

function createNode(x,y){
  if(nodes.length>=12)return;
  const idx=getNoteIndex(x,y);
  const freq=NOTES[idx];
  const col=COLORS[idx];
  
  // Audio
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  const filter=audioCtx.createBiquadFilter();
  osc.type='sine';
  osc.frequency.value=freq;
  filter.type='lowpass';
  filter.frequency.value=800;
  filter.Q.value=2;
  gain.gain.value=0;
  gain.gain.linearRampToValueAtTime(0.12,audioCtx.currentTime+0.3);
  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  
  const node={x,y,freq,color:col,osc,gain,filter,idx,born:Date.now(),radius:0,targetRadius:0,vx:0,vy:0};
  nodes.push(node);
  
  // Ripple
  ripples.push({x,y,color:col,r:0,maxR:120,alpha:0.5,born:Date.now()});
  
  updateHint();
}

function removeNode(node){
  node.gain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.3);
  setTimeout(()=>{try{node.osc.stop()}catch(e){}},400);
  ripples.push({x:node.x,y:node.y,color:'#ff4444',r:0,maxR:80,alpha:0.4,born:Date.now()});
  nodes=nodes.filter(n=>n!==node);
  updateHint();
}

function moveNode(node,x,y){
  const nx=x/W;
  node.x=x;node.y=y;
  const idx=Math.min(11,Math.max(0,Math.floor(nx*12)));
  if(idx!==node.idx){
    node.idx=idx;
    node.freq=NOTES[idx];
    node.color=COLORS[idx];
    node.osc.frequency.linearRampToValueAtTime(node.freq,audioCtx.currentTime+0.1);
  }
}

function updateHint(){
  const hint=document.getElementById('hint');
  const count=document.getElementById('count');
  count.textContent=nodes.length+'/12 nodes';
  hint.style.opacity=nodes.length===0?'1':'0';
  document.getElementById('share-btn').style.opacity=nodes.length>=2?'1':'0';
}

// Connections
function getConnections(){
  const conns=[];
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<250){
        conns.push({a:nodes[i],b:nodes[j],dist,alpha:1-dist/250});
      }
    }
  }
  return conns;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const now=Date.now();
  
  // Connections
  const conns=getConnections();
  for(const c of conns){
    ctx.beginPath();
    ctx.moveTo(c.a.x,c.a.y);
    ctx.lineTo(c.b.x,c.b.y);
    const mix=lerpColor(c.a.color,c.b.color,0.5);
    ctx.strokeStyle=hexAlpha(mix,c.alpha*0.12);
    ctx.lineWidth=1;
    ctx.stroke();
    
    // Traveling pulse on connection
    const speed=0.0004;
    const period=2000;
    const t=((now-c.a.born)%period)/period;
    const px=c.a.x+(c.b.x-c.a.x)*t;
    const py=c.a.y+(c.b.y-c.a.y)*t;
    ctx.beginPath();
    ctx.arc(px,py,2,0,Math.PI*2);
    ctx.fillStyle=hexAlpha(mix,c.alpha*0.3);
    ctx.fill();
  }
  
  // Ripples
  for(let i=ripples.length-1;i>=0;i--){
    const r=ripples[i];
    const age=(now-r.born)/1000;
    r.r=age*200;
    r.alpha=Math.max(0,0.5-age*0.8);
    if(r.alpha<=0){ripples.splice(i,1);continue}
    ctx.beginPath();
    ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
    ctx.strokeStyle=hexAlpha(r.color,r.alpha);
    ctx.lineWidth=1.5;
    ctx.stroke();
  }
  
  // Nodes
  for(const n of nodes){
    const age=(now-n.born)/1000;
    const pulse=1+Math.sin(age*2)*0.15;
    const baseR=18*pulse;
    
    // Glow
    const grad=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,baseR*3);
    grad.addColorStop(0,hexAlpha(n.color,0.12));
    grad.addColorStop(1,hexAlpha(n.color,0));
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.arc(n.x,n.y,baseR*3,0,Math.PI*2);
    ctx.fill();
    
    // Outer ring
    ctx.beginPath();
    ctx.arc(n.x,n.y,baseR,0,Math.PI*2);
    ctx.strokeStyle=hexAlpha(n.color,0.3);
    ctx.lineWidth=1.5;
    ctx.stroke();
    
    // Inner dot
    ctx.beginPath();
    ctx.arc(n.x,n.y,baseR*0.4,0,Math.PI*2);
    ctx.fillStyle=hexAlpha(n.color,0.8);
    ctx.fill();
    
    // Note label
    const noteNames=['C','D','E','G','A','c','d','e','g','a','c\'','d\''];
    ctx.fillStyle=hexAlpha(n.color,0.25);
    ctx.font='9px Inter';
    ctx.textAlign='center';
    ctx.fillText(noteNames[n.idx],n.x,n.y+baseR+14);
  }
  
  requestAnimationFrame(draw);
}

function hexAlpha(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function lerpColor(a,b,t){
  const ar=parseInt(a.slice(1,3),16),ag=parseInt(a.slice(3,5),16),ab=parseInt(a.slice(5,7),16);
  const br=parseInt(b.slice(1,3),16),bg=parseInt(b.slice(3,5),16),bb=parseInt(b.slice(5,7),16);
  const r=Math.round(ar+(br-ar)*t),g=Math.round(ag+(bg-ag)*t),bl=Math.round(ab+(bb-ab)*t);
  return '#'+[r,g,bl].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// Interaction
function getPos(e){
  if(e.touches)return{x:e.touches[0].clientX,y:e.touches[0].clientY};
  return{x:e.clientX,y:e.clientY};
}

function findNode(x,y){
  for(let i=nodes.length-1;i>=0;i--){
    const dx=x-nodes[i].x,dy=y-nodes[i].y;
    if(dx*dx+dy*dy<30*30)return nodes[i];
  }
  return null;
}

canvas.addEventListener('pointerdown',e=>{
  if(!started)return;
  const{x,y}=getPos(e);
  const now=Date.now();
  
  // Double tap to remove
  if(now-lastTap<350){
    const node=findNode(x,y);
    if(node){removeNode(node);lastTap=0;return}
  }
  lastTap=now;
  
  // Drag existing node
  const node=findNode(x,y);
  if(node){
    dragging=node;
    dragOff.x=x-node.x;dragOff.y=y-node.y;
    return;
  }
  
  // Create new node (small delay to avoid creating on double-tap)
  setTimeout(()=>{
    if(Date.now()-lastTap>300&&nodes.length<12&&!findNode(x,y)){
      createNode(x,y);
    }
  },350);
});

canvas.addEventListener('pointermove',e=>{
  if(dragging){
    const{x,y}=getPos(e);
    moveNode(dragging,x-dragOff.x,y-dragOff.y);
  }
});

canvas.addEventListener('pointerup',()=>{dragging=null});
canvas.addEventListener('pointercancel',()=>{dragging=null});

// Save image
document.getElementById('share-btn').addEventListener('click',()=>{
  const link=document.createElement('a');
  link.download='resonance.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
});

// Start
document.getElementById('start-btn').addEventListener('click',()=>{
  document.getElementById('start-overlay').style.display='none';
  initAudio();
  started=true;
  draw();
  updateHint();
});

// Keep audio alive
setInterval(()=>{
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
},1000);
</script>
</body>
</html>

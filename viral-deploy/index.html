<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Singularity</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;overflow:hidden;font-family:'Inter',sans-serif}
canvas{display:block;position:fixed;inset:0;cursor:crosshair}

#hud{position:fixed;top:16px;left:16px;z-index:10;pointer-events:none}
#hud h1{font-size:1rem;font-weight:600;color:rgba(255,255,255,.6);letter-spacing:.06em}
#hud p{font-size:.65rem;color:rgba(255,255,255,.25);margin-top:3px}

#bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px}
.b{font-family:'Inter',sans-serif;font-size:.68rem;font-weight:400;padding:7px 16px;background:rgba(255,255,255,.05);color:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.07);border-radius:5px;cursor:pointer;transition:all .25s;backdrop-filter:blur(6px)}
.b:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.75)}
.b:active{transform:scale(.95)}

#info{position:fixed;bottom:16px;right:16px;z-index:10;font-size:.6rem;color:rgba(255,255,255,.18);pointer-events:none;text-align:right;line-height:1.5}

@media(max-width:600px){
  #hud h1{font-size:.85rem}
  .b{padding:6px 12px;font-size:.62rem}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <h1>SINGULARITY</h1>
  <p>click to place mass &middot; watch orbits emerge</p>
</div>
<div id="bar">
  <button class="b" id="bc">Clear</button>
  <button class="b" id="bt">Trails</button>
  <button class="b" id="bm">Mass</button>
  <button class="b" id="bs">Save</button>
</div>
<div id="info"></div>

<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H;
const resize=()=>{W=cv.width=innerWidth;H=cv.height=innerHeight};
resize();addEventListener('resize',resize);

const G=0.4,SOFT=20,MAX_P=600,DT=0.8;
let masses=[],particles=[],showTrails=true,massLevel=0;
const massPresets=[500,1500,4000];
const massColors=['#a78bfa','#f472b6','#fbbf24'];

// Particle
class P{
  constructor(x,y,vx,vy){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;
    this.trail=[];this.maxTrail=40+Math.random()*30|0;
    this.life=500+Math.random()*600|0;
    this.hue=200+Math.random()*60;
    this.alive=true;
  }
  step(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>this.maxTrail)this.trail.shift();
    for(const m of masses){
      const dx=m.x-this.x,dy=m.y-this.y;
      const d2=dx*dx+dy*dy+SOFT*SOFT;
      const d=Math.sqrt(d2);
      const f=G*m.m/d2;
      this.vx+=dx/d*f*DT;
      this.vy+=dy/d*f*DT;
    }
    this.x+=this.vx*DT;
    this.y+=this.vy*DT;
    this.life--;
    const spd=Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    if(this.life<=0||this.x<-100||this.x>W+100||this.y<-100||this.y>H+100||spd>15)this.alive=false;
    // absorbed by mass
    for(const m of masses){
      const dx=m.x-this.x,dy=m.y-this.y;
      if(dx*dx+dy*dy<m.r*m.r*0.5){this.alive=false;break}
    }
  }
  draw(){
    if(showTrails&&this.trail.length>2){
      cx.beginPath();
      cx.moveTo(this.trail[0].x,this.trail[0].y);
      for(let i=1;i<this.trail.length;i++){
        cx.lineTo(this.trail[i].x,this.trail[i].y);
      }
      const alpha=Math.min(0.35,this.life/200);
      cx.strokeStyle=`hsla(${this.hue},70%,65%,${alpha})`;
      cx.lineWidth=0.8;
      cx.stroke();
    }
    cx.beginPath();
    cx.arc(this.x,this.y,1.2,0,Math.PI*2);
    cx.fillStyle=`hsla(${this.hue},80%,75%,${Math.min(0.9,this.life/100)})`;
    cx.fill();
  }
}

// Mass
class M{
  constructor(x,y,level){
    this.x=x;this.y=y;
    this.level=level;
    this.m=massPresets[level];
    this.r=8+level*6;
    this.color=massColors[level];
    this.phase=Math.random()*Math.PI*2;
  }
  draw(t){
    const pulse=1+Math.sin(t*0.002+this.phase)*0.08;
    // glow
    const gr=cx.createRadialGradient(this.x,this.y,this.r*0.3,this.x,this.y,this.r*4*pulse);
    gr.addColorStop(0,this.color+'40');
    gr.addColorStop(0.5,this.color+'10');
    gr.addColorStop(1,this.color+'00');
    cx.beginPath();
    cx.arc(this.x,this.y,this.r*4*pulse,0,Math.PI*2);
    cx.fillStyle=gr;
    cx.fill();
    // core
    const cr=cx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*pulse);
    cr.addColorStop(0,'#ffffff');
    cr.addColorStop(0.3,this.color);
    cr.addColorStop(1,this.color+'00');
    cx.beginPath();
    cx.arc(this.x,this.y,this.r*pulse,0,Math.PI*2);
    cx.fillStyle=cr;
    cx.fill();
  }
}

function spawnEdge(){
  if(particles.length>=MAX_P)return;
  const side=Math.random()*4|0;
  let x,y,vx,vy;
  const speed=0.5+Math.random()*0.8;
  if(side===0){x=-5;y=Math.random()*H;vx=speed;vy=(Math.random()-0.5)*speed}
  else if(side===1){x=W+5;y=Math.random()*H;vx=-speed;vy=(Math.random()-0.5)*speed}
  else if(side===2){x=Math.random()*W;y=-5;vx=(Math.random()-0.5)*speed;vy=speed}
  else{x=Math.random()*W;y=H+5;vx=(Math.random()-0.5)*speed;vy=-speed}
  // bias toward center
  if(masses.length>0){
    const t=masses[Math.random()*masses.length|0];
    const dx=t.x-x,dy=t.y-y,d=Math.sqrt(dx*dx+dy*dy);
    if(d>0){vx+=dx/d*speed*0.3;vy+=dy/d*speed*0.3}
  }
  particles.push(new P(x,y,vx,vy));
}

// Interaction
cv.addEventListener('click',e=>{
  // don't place on UI
  masses.push(new M(e.clientX,e.clientY,massLevel));
  // burst of particles
  for(let i=0;i<30;i++){
    const a=Math.random()*Math.PI*2,s=0.3+Math.random()*1.5;
    particles.push(new P(e.clientX,e.clientY,Math.cos(a)*s,Math.sin(a)*s));
  }
});
cv.addEventListener('dblclick',e=>{
  e.preventDefault();
  for(let i=masses.length-1;i>=0;i--){
    const dx=masses[i].x-e.clientX,dy=masses[i].y-e.clientY;
    if(dx*dx+dy*dy<masses[i].r*masses[i].r*4){masses.splice(i,1);break}
  }
});
// touch
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  masses.push(new M(t.clientX,t.clientY,massLevel));
  for(let i=0;i<30;i++){
    const a=Math.random()*Math.PI*2,s=0.3+Math.random()*1.5;
    particles.push(new P(t.clientX,t.clientY,Math.cos(a)*s,Math.sin(a)*s));
  }
},{passive:false});

// Buttons
document.getElementById('bc').addEventListener('click',e=>{
  e.stopPropagation();masses=[];particles=[];
  cx.fillStyle='#0a0a0f';cx.fillRect(0,0,W,H);
});
document.getElementById('bt').addEventListener('click',e=>{
  e.stopPropagation();showTrails=!showTrails;
  e.target.textContent=showTrails?'Trails':'No Trails';
});
let mIdx=0;
document.getElementById('bm').addEventListener('click',e=>{
  e.stopPropagation();mIdx=(mIdx+1)%3;massLevel=mIdx;
  e.target.textContent=['Small Mass','Medium Mass','Heavy Mass'][mIdx];
});
document.getElementById('bs').addEventListener('click',e=>{
  e.stopPropagation();
  const a=document.createElement('a');
  a.download='singularity-'+Date.now()+'.png';
  a.href=cv.toDataURL();a.click();
});

// Loop
let frame=0;
function loop(t){
  requestAnimationFrame(loop);
  // fade
  if(showTrails){
    cx.fillStyle='rgba(10,10,15,0.015)';
  }else{
    cx.fillStyle='rgba(10,10,15,0.2)';
  }
  cx.fillRect(0,0,W,H);

  // spawn
  if(masses.length>0&&frame%3===0)spawnEdge();

  // update particles
  for(const p of particles)p.step();
  particles=particles.filter(p=>p.alive);

  // draw
  for(const p of particles)p.draw();
  for(const m of masses)m.draw(t);

  if(frame%60===0){
    document.getElementById('info').innerHTML=
      particles.length+' bodies<br>'+masses.length+' masses';
  }
  frame++;
}
cx.fillStyle='#0a0a0f';cx.fillRect(0,0,W,H);
requestAnimationFrame(loop);
</script>
</body>
</html>

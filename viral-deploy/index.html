<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Chromatic</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:#0a0a0f;font-family:'Inter',sans-serif;color:#e0e0e0;touch-action:none;user-select:none}

#intro{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:#0a0a0f;transition:opacity .8s ease}
#intro.gone{opacity:0;pointer-events:none}
#intro h1{font-size:clamp(28px,7vw,52px);font-weight:700;letter-spacing:-1.5px;margin-bottom:12px;background:linear-gradient(135deg,#ff7070,#70a0ff,#c070ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#intro p{font-size:clamp(13px,2.5vw,16px);color:#555;font-weight:300;max-width:360px;text-align:center;line-height:1.7;margin-bottom:36px}
.btn{font-family:'Inter',sans-serif;font-size:14px;font-weight:500;padding:14px 44px;border:none;border-radius:80px;cursor:pointer;transition:transform .15s,opacity .3s;letter-spacing:.3px}
.btn:active{transform:scale(.95)}
#start-btn{background:#fff;color:#0a0a0f}

#scene{position:fixed;inset:0;display:none}
#scene.active{display:block}
canvas.layer{position:fixed;inset:0;width:100%;height:100%}
#false-layer{filter:hue-rotate(180deg);z-index:1;transition:filter 2s ease}
#true-layer{z-index:2;pointer-events:none;transition:clip-path .04s linear,opacity 1s ease}
#lens-ring{position:fixed;width:180px;height:180px;border-radius:50%;border:1.5px solid rgba(255,255,255,.1);pointer-events:none;transform:translate(-50%,-50%);z-index:3;box-shadow:0 0 60px rgba(255,255,255,.02),inset 0 0 30px rgba(255,255,255,.015);transition:width .5s ease,height .5s ease,opacity .6s ease}

#hud{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:20px 24px;pointer-events:none}
.hud-item{font-size:12px;font-weight:400;letter-spacing:1.5px;color:rgba(255,255,255,.7);text-transform:uppercase;background:rgba(0,0,0,.3);padding:6px 14px;border-radius:20px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}

#result{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0f;padding:24px}
#result.show{display:flex}
#result-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:0;opacity:0;transition:opacity 2s ease}
#result-canvas.visible{opacity:1}
#result-overlay{position:relative;z-index:1;text-align:center}
.r-title{font-size:clamp(16px,3.5vw,22px);font-weight:300;color:#556;margin-bottom:8px;letter-spacing:.5px}
.r-pct{font-size:clamp(72px,18vw,130px);font-weight:800;letter-spacing:-4px;line-height:1;margin-bottom:4px;background:linear-gradient(135deg,#ff7070,#70a0ff,#c070ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.r-label{font-size:12px;color:#445;font-weight:400;letter-spacing:4px;text-transform:uppercase;margin-bottom:36px}
.r-desc{font-size:clamp(12px,2.2vw,14px);color:#556;font-weight:300;max-width:340px;text-align:center;line-height:1.9;margin-bottom:40px}
.r-divider{width:36px;height:1px;background:rgba(255,255,255,.06);margin:0 auto 40px}
#again-btn{background:rgba(255,255,255,.05);color:#667;border:1px solid rgba(255,255,255,.07);font-size:13px}
#again-btn:hover{border-color:rgba(255,255,255,.14);color:#889}

@media(max-width:480px){
  .hud-item{font-size:11px;padding:5px 10px;letter-spacing:1px}
}
</style>
</head>
<body>

<div id="intro">
  <h1>Chromatic</h1>
  <p>The colors you see are wrong. Move the lens to find the truth before it closes.</p>
  <button class="btn" id="start-btn">Look Through</button>
</div>

<div id="scene">
  <canvas id="false-layer" class="layer"></canvas>
  <canvas id="true-layer" class="layer"></canvas>
  <div id="lens-ring"></div>
  <div id="hud">
    <div class="hud-item" id="timer-display">30s</div>
    <div class="hud-item" id="reveal-display">0% found</div>
  </div>
</div>

<div id="result">
  <canvas id="result-canvas"></canvas>
  <div id="result-overlay">
    <div class="r-title">You discovered</div>
    <div class="r-pct" id="r-pct"></div>
    <div class="r-label">of the truth</div>
    <div class="r-divider"></div>
    <div class="r-desc" id="r-desc"></div>
    <button class="btn" id="again-btn">Try Again</button>
  </div>
</div>

<script>
const DURATION=30;
const GRID=24;
const LENS_START=95;
const LENS_END=30;

let fC,tC,rC; // canvases
let artBuf; // offscreen art
let W,H;
let mx=-999,my=-999;
let lensR=LENS_START;
let running=false,started=false;
let startTime=0,timerID=null;
let grid=[],pct=0;

function resize(){
  W=window.innerWidth;H=window.innerHeight;
  [fC,tC,rC].forEach(c=>{c.width=W;c.height=H});
}

function init(){
  fC=document.getElementById('false-layer');
  tC=document.getElementById('true-layer');
  rC=document.getElementById('result-canvas');
  resize();
}

function genArt(ctx,w,h){
  ctx.fillStyle='#0a0a0f';
  ctx.fillRect(0,0,w,h);

  const blobs=[
    {x:.22,y:.32,r:.42,c:'rgba(255,70,90,0.22)'},
    {x:.72,y:.22,r:.36,c:'rgba(50,150,255,0.18)'},
    {x:.5,y:.72,r:.46,c:'rgba(150,50,255,0.16)'},
    {x:.12,y:.78,r:.26,c:'rgba(255,175,35,0.14)'},
    {x:.88,y:.52,r:.32,c:'rgba(35,255,170,0.14)'},
    {x:.52,y:.38,r:.22,c:'rgba(255,90,190,0.18)'},
    {x:.38,y:.58,r:.28,c:'rgba(90,190,255,0.10)'},
    {x:.65,y:.82,r:.2,c:'rgba(255,130,70,0.12)'},
  ];
  const s=Math.min(w,h);
  for(const b of blobs){
    const bx=b.x*w,by=b.y*h,br=b.r*s;
    const g=ctx.createRadialGradient(bx,by,0,bx,by,br);
    g.addColorStop(0,b.c);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;
    ctx.fillRect(0,0,w,h);
  }

  // Secondary layer for depth
  const blobs2=[
    {x:.4,y:.45,r:.5,c:'rgba(255,120,200,0.06)'},
    {x:.6,y:.55,r:.45,c:'rgba(100,180,255,0.05)'},
  ];
  for(const b of blobs2){
    const bx=b.x*w,by=b.y*h,br=b.r*s;
    const g=ctx.createRadialGradient(bx,by,0,bx,by,br);
    g.addColorStop(0,b.c);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;
    ctx.fillRect(0,0,w,h);
  }

  // Stars
  for(let i=0;i<350;i++){
    const sx=Math.random()*w,sy=Math.random()*h;
    const sr=Math.random()*1.6+0.3;
    ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${Math.random()*.55+.08})`;
    ctx.fill();
  }

  // Bright accent stars
  for(let i=0;i<12;i++){
    const sx=Math.random()*w,sy=Math.random()*h;
    const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,3+Math.random()*4);
    sg.addColorStop(0,'rgba(255,255,255,0.6)');
    sg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=sg;ctx.fillRect(sx-6,sy-6,12,12);
  }

  // Geometric rings
  ctx.lineWidth=.5;
  for(let i=0;i<6;i++){
    const cx=w*(.15+Math.random()*.7),cy=h*(.15+Math.random()*.7);
    const cr=40+Math.random()*140;
    ctx.beginPath();ctx.arc(cx,cy,cr,0,Math.PI*2);
    ctx.strokeStyle=`rgba(255,255,255,${.015+Math.random()*.03})`;
    ctx.stroke();
  }
}

function copyArt(){
  fC.getContext('2d').drawImage(artBuf,0,0);
  tC.getContext('2d').drawImage(artBuf,0,0);
  rC.getContext('2d').drawImage(artBuf,0,0);
}

function updateLens(x,y){
  mx=x;my=y;
  const ring=document.getElementById('lens-ring');
  ring.style.left=x+'px';ring.style.top=y+'px';
  ring.style.width=lensR*2+'px';ring.style.height=lensR*2+'px';
  tC.style.clipPath=`circle(${lensR}px at ${x}px ${y}px)`;

  const cw=W/GRID,ch=H/GRID;
  const gx=Math.floor(x/cw),gy=Math.floor(y/ch);
  const rCells=Math.ceil(lensR/Math.max(cw,ch));
  for(let dy=-rCells;dy<=rCells;dy++){
    for(let dx=-rCells;dx<=rCells;dx++){
      const cx=gx+dx,cy=gy+dy;
      if(cx>=0&&cx<GRID&&cy>=0&&cy<GRID){
        const d=Math.sqrt(dx*dx+dy*dy)*Math.max(cw,ch);
        if(d<=lensR)grid[cy][cx]=true;
      }
    }
  }
  let tot=0;
  for(let y=0;y<GRID;y++)for(let x=0;x<GRID;x++)if(grid[y][x])tot++;
  pct=Math.round(tot/(GRID*GRID)*100);
  document.getElementById('reveal-display').textContent=pct+'% found';
}

function startGame(){
  document.getElementById('intro').classList.add('gone');
  const scene=document.getElementById('scene');
  scene.classList.add('active');
  window.addEventListener('resize',onResize);

  artBuf=document.createElement('canvas');
  artBuf.width=W;artBuf.height=H;
  genArt(artBuf.getContext('2d'),W,H);

  grid=[];for(let y=0;y<GRID;y++){grid[y]=[];for(let x=0;x<GRID;x++)grid[y][x]=false;}
  pct=0;lensR=LENS_START;
  copyArt();

  fC.style.filter='hue-rotate(180deg)';fC.style.transition='none';
  tC.style.opacity='1';tC.style.transition='clip-path .04s linear';
  document.getElementById('lens-ring').style.opacity='1';

  // Start lens at center
  updateLens(W/2,H/2);

  running=true;started=true;
  startTime=Date.now();
  timerID=setInterval(tick,80);
}

function onResize(){
  resize();
  if(artBuf){
    artBuf.width=W;artBuf.height=H;
    genArt(artBuf.getContext('2d'),W,H);
    copyArt();
  }
}

function tick(){
  if(!running)return;
  const elapsed=(Date.now()-startTime)/1000;
  const rem=Math.max(0,DURATION-elapsed);
  document.getElementById('timer-display').textContent=Math.ceil(rem)+'s';
  lensR=LENS_START-(LENS_START-LENS_END)*(elapsed/DURATION);
  if(rem<=0){clearInterval(timerID);endGame();}
}

function endGame(){
  running=false;

  // Dramatic reveal: remove hue-rotate
  fC.style.transition='filter 2s ease';
  fC.style.filter='hue-rotate(0deg)';
  tC.style.transition='opacity 1.5s ease';
  tC.style.opacity='0';
  const ring=document.getElementById('lens-ring');
  ring.style.opacity='0';
  document.getElementById('hud').style.transition='opacity .5s ease';
  document.getElementById('hud').style.opacity='0';

  setTimeout(()=>{
    document.getElementById('scene').classList.remove('active');
    const r=document.getElementById('result');
    r.classList.add('show');
    rC.classList.add('visible');

    document.getElementById('r-pct').textContent=pct+'%';

    let desc;
    if(pct>85) desc='You searched relentlessly. Almost nothing escaped your lens. The truth was always there, hidden beneath a lie of complementary colors. You simply refused to look away.';
    else if(pct>65) desc='A thorough explorer. You moved with purpose, tracing the canvas with dedication. The hues that fool most people could not hold you for long.';
    else if(pct>45) desc='You found the truth in fragments, like sunlight through half-closed blinds. Some corners of the canvas remain untouched, but what you saw was real. That is enough for most.';
    else if(pct>25) desc='Glimpses of reality, scattered across the screen. You saw enough to know something was wrong with the colors. Whether that knowledge is a gift or a burden is unclear.';
    else desc='Barely a scratch on the surface of the illusion. The false colors remain mostly intact, undisturbed. Perhaps you were content with the lie. Perhaps the lens simply closed too fast.';
    document.getElementById('r-desc').textContent=desc;
  },2200);
}

// Input handlers
document.addEventListener('mousemove',e=>{if(running)updateLens(e.clientX,e.clientY)});
document.addEventListener('touchstart',e=>{if(!running)return;e.preventDefault();updateLens(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
document.addEventListener('touchmove',e=>{if(!running)return;e.preventDefault();updateLens(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});

document.getElementById('start-btn').addEventListener('click',startGame);

document.getElementById('again-btn').addEventListener('click',()=>{
  const r=document.getElementById('result');
  r.classList.remove('show');
  rC.classList.remove('visible');
  document.getElementById('hud').style.opacity='1';
  document.getElementById('intro').classList.remove('gone');
  document.getElementById('intro').style.opacity='1';
  started=false;running=false;
  window.removeEventListener('resize',onResize);
});

init();
</script>
</body>
</html>

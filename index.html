<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Museum of Bizarre History</title>
  <meta name="description" content="Every refresh, a new oil painting of the weirdest event from a random year.">
  <meta property="og:title" content="Museum of Bizarre History">
  <meta property="og:description" content="The weirdest thing that happened in a random year, painted in oil. Refresh for another.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0e0c0b;
      --bg-card: #1a1714;
      --bg-frame: #2a2420;
      --gold: #c9a84c;
      --gold-dim: #8a7333;
      --gold-bright: #e8c960;
      --text: #e8e0d4;
      --text-dim: #9a9088;
      --text-muted: #6a6258;
      --red-velvet: #5c1a1a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(201,168,76,0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(201,168,76,0.02) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 1.5rem 1rem;
      max-width: 680px;
    }

    header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 400;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      color: var(--gold);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    header p {
      margin-top: 0.6rem;
      font-size: 0.82rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 5rem;
      width: 100%;
      max-width: 640px;
    }

    .painting-frame {
      position: relative;
      width: 100%;
      background: var(--bg-frame);
      border: 3px solid var(--gold-dim);
      box-shadow:
        0 0 0 6px var(--bg-card),
        0 0 0 8px var(--gold-dim),
        0 8px 40px rgba(0,0,0,0.5),
        inset 0 0 30px rgba(0,0,0,0.3);
      border-radius: 2px;
      overflow: hidden;
    }

    .painting-frame::before {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid rgba(201,168,76,0.15);
      pointer-events: none;
      z-index: 2;
    }

    .painting-container {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--red-velvet);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .painting-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.8s ease;
    }

    .painting-container img.loading { opacity: 0; }
    .painting-container img.loaded { opacity: 1; }

    .loading-spinner {
      position: absolute;
      width: 32px;
      height: 32px;
      border: 2px solid rgba(201,168,76,0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    .error-overlay svg { opacity: 0.4; }

    .plaque {
      margin-top: 1.8rem;
      background: var(--bg-card);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 4px;
      padding: 1.4rem 1.8rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .plaque .year {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 0.8rem;
      color: var(--gold);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .plaque .title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.1rem, 2.5vw, 1.35rem);
      font-weight: 700;
      line-height: 1.35;
      color: var(--text);
      margin-bottom: 0.6rem;
    }

    .plaque .description {
      font-size: 0.82rem;
      line-height: 1.65;
      color: var(--text-dim);
      font-weight: 300;
    }

    .plaque .source {
      margin-top: 0.75rem;
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    .refresh-btn {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.7rem 1.6rem;
      background: rgba(14,12,11,0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .refresh-btn:hover {
      background: rgba(201,168,76,0.08);
      border-color: var(--gold);
      color: var(--gold-bright);
    }

    .refresh-btn:active { transform: translateX(-50%) scale(0.97); }

    .refresh-btn svg {
      width: 14px;
      height: 14px;
      transition: transform 0.4s ease;
    }

    .refresh-btn:hover svg { transform: rotate(180deg); }

    footer {
      position: relative;
      z-index: 1;
      padding: 2rem 1.5rem 4.5rem;
      text-align: center;
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 480px) {
      header { padding: 2rem 1rem 0.5rem; }
      main { padding: 1.5rem 1rem; }
      .plaque { padding: 1.2rem 1.4rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Museum of Bizarre History</h1>
    <p>The strangest event from a random year, painted in oil</p>
  </header>

  <main>
    <div class="painting-frame">
      <div class="painting-container" id="paintingContainer">
        <div class="loading-spinner" id="spinner"></div>
        <img id="painting" class="loading" alt="Oil painting of a bizarre historical event">
        <div class="error-overlay" id="errorOverlay" style="display:none;">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
          </svg>
          <span>Painting unavailable</span>
        </div>
      </div>
    </div>

    <div class="plaque">
      <div class="year" id="plaqueYear"></div>
      <div class="title" id="plaqueTitle"></div>
      <div class="description" id="plaqueDesc"></div>
      <div class="source" id="plaqueSource"></div>
    </div>

    <button class="refresh-btn" onclick="showNewEvent()" aria-label="Show another bizarre event">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a10 10 0 1 0 10 10"/>
        <path d="M12 2v10l6.5 6.5"/>
      </svg>
      Another Exhibit
    </button>
  </main>

  <footer>
    Every refresh is a new exhibit &middot; Oil paintings by AI &middot; Events are real history
  </footer>

  <script src="events.js"></script>
  <script>
    let lastIdx = -1;
    const painting = document.getElementById('painting');
    const spinner = document.getElementById('spinner');
    const errorOverlay = document.getElementById('errorOverlay');

    function pickEvent() {
      let idx;
      do {
        idx = Math.floor(Math.random() * bizarreEvents.length);
      } while (idx === lastIdx && bizarreEvents.length > 1);
      lastIdx = idx;
      return bizarreEvents[idx];
    }

    function showNewEvent() {
      const event = pickEvent();

      document.getElementById('plaqueYear').textContent = 'Anno ' + event.year;
      document.getElementById('plaqueTitle').textContent = event.title;
      document.getElementById('plaqueDesc').textContent = event.description;
      document.getElementById('plaqueSource').textContent = event.source || '';

      painting.classList.remove('loaded');
      painting.classList.add('loading');
      spinner.style.display = 'block';
      errorOverlay.style.display = 'none';
      painting.style.display = 'block';

      const src = event.image || '';
      const img = new Image();
      img.onload = function() {
        painting.src = img.src;
        painting.classList.remove('loading');
        painting.classList.add('loaded');
        spinner.style.display = 'none';
      };
      img.onerror = function() {
        painting.style.display = 'none';
        spinner.style.display = 'none';
        errorOverlay.style.display = 'flex';
      };
      img.src = src;
    }

    showNewEvent();
  </script>
</body>
</html>
